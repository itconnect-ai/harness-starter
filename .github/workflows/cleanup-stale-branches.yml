# .github/workflows/cleanup-stale-branches.yml
#
# 에이전트가 만든 임시 브랜치(story/*, chore/*, fix/*)가 누적되지 않도록
# 주기적으로 정리하는 workflow.
#
# 정책:
#   - merged 브랜치만 삭제 (unmerged는 건드리지 않음)
#   - 생성 후 14일 이상 경과한 것만 대상
#   - main, develop, release/*, hotfix/*는 보호 (삭제 안 함)
#
# 실행: 매주 월요일 09:00 UTC + 수동 트리거
#
# ⚠️ GitHub repo 설정의 "Automatically delete head branches"도 활성화하면
# PR merge 직후 즉시 삭제되어 이 workflow는 "놓친 것" 정리용이 됩니다.
# 권장: 둘 다 활성화 (즉시 삭제 + 주간 청소).

name: Cleanup Stale Branches

on:
  schedule:
    - cron: '0 9 * * 1'  # 매주 월요일 09:00 UTC
  workflow_dispatch:     # 수동 실행 가능

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Delete merged stale branches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          # 보호 브랜치 패턴
          PROTECTED='^(main|develop|release/.*|hotfix/.*)$'

          # 14일 이전 커밋 기준 timestamp
          CUTOFF=$(date -u -d '14 days ago' +%s)

          echo "=== Scanning remote branches ==="

          # merged된 원격 브랜치 목록 (main과 develop 양쪽에 merged된 것만 삭제)
          DELETED=0
          KEPT=0

          # develop와 main 양쪽에 merged된 브랜치만 삭제 대상
          git branch -r --merged origin/main | grep -v 'HEAD' | sed 's|origin/||' | while read -r branch; do
            branch=$(echo "$branch" | xargs)  # trim
            [ -z "$branch" ] && continue

            # 보호 브랜치 skip
            if echo "$branch" | grep -qE "$PROTECTED"; then
              echo "  [KEEP] $branch (protected)"
              KEPT=$((KEPT+1))
              continue
            fi

            # develop에도 merged 되어 있는지 확인
            if ! git branch -r --merged origin/develop 2>/dev/null | grep -q "origin/$branch$"; then
              echo "  [KEEP] $branch (not merged to develop)"
              KEPT=$((KEPT+1))
              continue
            fi

            # 마지막 커밋 시점 확인
            LAST_COMMIT=$(git log -1 --format=%ct "origin/$branch" 2>/dev/null || echo 0)
            if [ "$LAST_COMMIT" -gt "$CUTOFF" ]; then
              echo "  [KEEP] $branch (too recent)"
              KEPT=$((KEPT+1))
              continue
            fi

            echo "  [DELETE] $branch (merged + stale)"
            git push origin --delete "$branch" || echo "    failed to delete $branch"
            DELETED=$((DELETED+1))
          done

          echo ""
          echo "=== Summary ==="
          echo "Review complete. See log above for per-branch decisions."
