# .github/workflows/release.yml
#
# 태그 기반 GitHub Release 자동 생성 워크플로우.
# 트리거: 'v*.*.*' 형식 태그 push (예: v1.2.3, v1.2.3-beta.1)
#
# 흐름:
#   1. verify: CI 검증(lint/typecheck/test/build) 재실행 — 태그 생성 시점의
#      코드가 실제로 빌드 가능한지 보증.
#   2. release: GitHub Release 생성, generate_release_notes로 커밋 히스토리
#      기반 changelog 자동 작성. -beta/-rc/-alpha 등 하이픈 포함 태그는
#      pre-release로 표시.
#
# 현재 deploy.yml(main push 시 서버 배포)과 역할 분리:
#   - main push = 개발 진행 (실시간)
#   - v* tag    = 공식 릴리즈 표시 (changelog 생성, GitHub Release)
#
# 태그 생성 명령 예시:
#   git tag -a v1.2.3 -m "Release 1.2.3"
#   git push origin v1.2.3

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Tests
        run: npm run test

      - name: Build
        run: npm run build

  release:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 전체 히스토리 (release notes 자동 생성에 필요)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          name: ${{ github.ref_name }}
          # body_path: CHANGELOG.md    # 수동 changelog 사용 시 주석 해제
